<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MathMate — Sam's Practice Session</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F7F4;
    --surface:  #FFFFFF;
    --ink:      #1A1A1A;
    --muted:    #6B7280;
    --rule:     #E5E7EB;
    --teal:     #2A9D8F;
    --teal-lt:  #E1F5EE;
    --green:    #1D6A4A;
    --green-lt: #EAF3DE;
    --coral:    #C0392B;
    --coral-lt: #FAECE7;
    --amber:    #92620A;
    --amber-lt: #FAEEDA;
    --navy:     #2C3E50;
    --radius:   12px;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 3rem;
  }

  /* ── Top bar ── */
  .topbar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--teal);
  }
  .session-info {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .session-info span { color: var(--ink); font-weight: 500; }

  /* ── Main card area ── */
  .main {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* ── Progress ── */
  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .prog-track {
    height: 5px;
    background: var(--rule);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--rule);
    padding: 1.75rem 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .q-badge {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: #DBEAFE;
    color: #1D4ED8;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .q-op {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .q-timer {
    margin-left: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .q-equation {
    font-size: 3rem;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    text-align: center;
    padding: 1rem 0 1.5rem;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .q-blank {
    display: inline-block;
    min-width: 76px;
    border-bottom: 3px solid var(--teal);
    color: var(--teal);
    text-align: center;
  }

  .ans-row {
    display: flex;
    gap: 10px;
  }
  .ans-input {
    flex: 1;
    font-size: 1.6rem;
    font-family: Georgia, serif;
    font-weight: 700;
    text-align: center;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }
  .ans-input::-webkit-outer-spin-button,
  .ans-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .ans-input:focus { border-color: var(--teal); background: white; }
  .ans-input.correct { border-color: var(--green); background: var(--green-lt); color: var(--green); }
  .ans-input.incorrect { border-color: var(--coral); background: var(--coral-lt); color: var(--coral); }

  .btn-check {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 10px 22px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn-check:hover { background: #238276; }
  .btn-check:active { transform: scale(0.97); }
  .btn-check:disabled {
    background: var(--rule);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.correct  { background: var(--green-lt); color: var(--green); border: 1px solid #B7D9C4; }
  .feedback.incorrect{ background: var(--coral-lt); color: var(--coral); border: 1px solid #F5C4B8; }
  .feedback.retry    { background: var(--amber-lt); color: var(--amber); border: 1px solid #F0D88A; }

  .btn-next {
    margin-top: 12px;
    width: 100%;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 11px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-next:hover { background: #3D5166; }

  /* ── Trace strip ── */
  .trace-strip {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 5px;
    overflow-x: auto;
  }
  .trace-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .tdot {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.58rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .tdot.pending   { background: var(--rule); color: var(--muted); }
  .tdot.correct   { background: var(--green-lt); color: var(--green); border: 1.5px solid #B7D9C4; }
  .tdot.incorrect { background: var(--coral-lt); color: var(--coral); border: 1.5px solid #F5C4B8; }
  .tdot.retry     { background: var(--amber-lt); color: var(--amber); border: 1.5px solid #F0D88A; }
  .tdot.current   { background: var(--teal); color: white; box-shadow: 0 0 0 3px var(--teal-lt); }

  /* ── Summary ── */
  .summary {
    text-align: center;
    padding: 2.5rem 1rem;
  }
  .summary-score {
    font-size: 4rem;
    font-family: Georgia, serif;
    font-weight: 700;
    color: var(--teal);
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-sub {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .summary-msg {
    font-size: 0.9rem;
    font-family: Georgia, serif;
    color: var(--muted);
    max-width: 340px;
    margin: 0 auto 1.75rem;
    line-height: 1.65;
  }

  /* ── Op breakdown (shown at end) ── */
  .op-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .op-pill {
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78rem;
  }
  .op-name { color: var(--muted); }
  .op-score { font-weight: 700; color: var(--ink); }

  /* ── Restart button ── */
  .btn-restart {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 12px 28px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: #3D5166; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    MathMate
  </div>
  <div class="session-info">Learner: <span>Sam</span> &nbsp;·&nbsp; Arithmetic Practice</div>
</div>

<div class="main">
  <div>
    <div class="prog-row">
      <span>Question <span id="qNumLabel">1</span> of 20</span>
      <span id="scoreLabel">0 correct</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-meta">
      <span class="q-badge" id="qBadge">Q 1</span>
      <span class="q-op" id="qOp">Addition</span>
      <span class="q-timer" id="qTimer">0s</span>
    </div>
    <div class="q-equation">
      <span id="qPre">47 + 35 = </span><span class="q-blank" id="qBlank">?</span>
    </div>
    <div class="ans-row">
      <input type="number" class="ans-input" id="answerInput" placeholder="?" autocomplete="off" />
      <button class="btn-check" id="btnCheck">Check ✓</button>
    </div>
    <div class="feedback" id="feedbackBox"></div>
    <button class="btn-next" id="btnNext">Next question →</button>
  </div>

  <div class="trace-strip">
    <span class="trace-label">Session trace</span>
    <div id="traceDots" style="display:flex;flex-wrap:nowrap;gap:5px;align-items:center;"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  { id:1,  op:'addition',       pre:'47 + 35 = ',      ans:82  },
  { id:2,  op:'addition',       pre:'124 + 89 = ',     ans:213 },
  { id:3,  op:'subtraction',    pre:'200 \u2212 64 = ', ans:136 },
  { id:4,  op:'multiplication', pre:'7 \u00D7 8 = ',   ans:56  },
  { id:5,  op:'multiplication', pre:'6 \u00D7 9 = ',   ans:54  },
  { id:6,  op:'multiplication', pre:'7 \u00D7 7 = ',   ans:49  },
  { id:7,  op:'multiplication', pre:'8 \u00D7 6 = ',   ans:48  },
  { id:8,  op:'division',       pre:'56 \u00F7 7 = ',  ans:8   },
  { id:9,  op:'division',       pre:'63 \u00F7 9 = ',  ans:7   },
  { id:10, op:'division',       pre:'144 \u00F7 12 = ', ans:12 },
  { id:11, op:'addition',       pre:'348 + 275 = ',    ans:623 },
  { id:12, op:'subtraction',    pre:'503 \u2212 178 = ', ans:325 },
  { id:13, op:'multiplication', pre:'13 \u00D7 14 = ', ans:182 },
  { id:14, op:'division',       pre:'256 \u00F7 16 = ', ans:16 },
  { id:15, op:'subtraction',    pre:'74 \u2212 38 = ',  ans:36 },
  { id:16, op:'addition',       pre:'256 + 147 = ',    ans:403 },
  { id:17, op:'multiplication', pre:'9 \u00D7 7 = ',   ans:63  },
  { id:18, op:'division',       pre:'72 \u00F7 8 = ',  ans:9   },
  { id:19, op:'subtraction',    pre:'300 \u2212 127 = ', ans:173 },
  { id:20, op:'addition',       pre:'189 + 213 = ',    ans:402 },
];

let state = {
  idx: 0,
  attempts: {},
  log: [],
  score: 0,
  qStart: Date.now(),
  tmrId: null,
};

function g(id) { return document.getElementById(id); }
function curQ() { return QUESTIONS[state.idx]; }

function renderQuestion() {
  const q = curQ();
  g('qNumLabel').textContent = state.idx + 1;
  g('qBadge').textContent = 'Q ' + (state.idx + 1);
  g('qOp').textContent = q.op.charAt(0).toUpperCase() + q.op.slice(1);
  g('qPre').textContent = q.pre;
  g('qBlank').textContent = '?';

  const inp = g('answerInput');
  inp.value = '';
  inp.className = 'ans-input';
  inp.disabled = false;

  g('btnCheck').disabled = false;
  g('feedbackBox').style.display = 'none';
  g('btnNext').style.display = 'none';
  g('progFill').style.width = ((state.idx / QUESTIONS.length) * 100) + '%';
  g('scoreLabel').textContent = state.score + ' correct';

  state.qStart = Date.now();
  clearInterval(state.tmrId);
  state.tmrId = setInterval(() => {
    const el = g('qTimer');
    if (el) el.textContent = Math.floor((Date.now() - state.qStart) / 1000) + 's';
  }, 1000);

  renderDots();
  try { inp.focus(); } catch(e) {}
}

function renderDots() {
  const c = g('traceDots');
  c.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const d = document.createElement('div');
    d.className = 'tdot';
    d.textContent = i + 1;
    if (i < state.idx) {
      const last = state.log.filter(e => e.qId === q.id).slice(-1)[0];
      if (last) {
        if (last.result === 'correct') d.classList.add('correct');
        else if (last.result === 'retry-correct') d.classList.add('retry');
        else d.classList.add('incorrect');
      } else {
        d.classList.add('pending');
      }
    } else if (i === state.idx) {
      d.classList.add('current');
    } else {
      d.classList.add('pending');
    }
    c.appendChild(d);
  });
}

function checkAnswer() {
  const q = curQ();
  const inp = g('answerInput');
  const val = parseInt(inp.value.trim(), 10);
  if (isNaN(val)) { try { inp.focus(); } catch(e) {} return; }

  const elapsed = Math.round((Date.now() - state.qStart) / 1000);
  clearInterval(state.tmrId);

  const attempts = state.attempts[q.id] || 0;
  state.attempts[q.id] = attempts + 1;

  const fb = g('feedbackBox');
  fb.style.display = 'block';
  inp.disabled = true;
  g('btnCheck').disabled = true;
  g('qBlank').textContent = val;

  if (val === q.ans) {
    inp.classList.add('correct');
    const result = attempts > 0 ? 'retry-correct' : 'correct';
    state.log.push({ qId: q.id, op: q.op, result, time: elapsed });
    if (result === 'correct') state.score++;

    if (result === 'correct') {
      fb.className = 'feedback correct';
      fb.textContent = elapsed < 6
        ? '\u2713 Correct \u2014 and really quick! That looks automatic.'
        : '\u2713 Correct! Good work thinking it through.';
    } else {
      fb.className = 'feedback retry';
      fb.textContent = '\u2713 Correct this time! Taking more time helped.';
    }
    g('btnNext').style.display = 'block';
    renderDots();

  } else {
    inp.classList.add('incorrect');
    if (attempts === 0) {
      inp.disabled = false;
      inp.value = '';
      g('btnCheck').disabled = false;
      state.attempts[q.id] = 1;
      fb.className = 'feedback incorrect';
      fb.textContent = '\u2717 Not quite \u2014 try again. Take your time.';
      clearInterval(state.tmrId);
      state.qStart = Date.now();
      state.tmrId = setInterval(() => {
        const el = g('qTimer');
        if (el) el.textContent = Math.floor((Date.now() - state.qStart) / 1000) + 's';
      }, 1000);
      try { inp.focus(); } catch(e) {}
    } else {
      state.log.push({ qId: q.id, op: q.op, result: 'incorrect', time: elapsed });
      fb.className = 'feedback incorrect';
      fb.textContent = '\u2717 The answer was ' + q.ans + '. We\u2019ll revisit this type.';
      g('btnNext').style.display = 'block';
      renderDots();
    }
  }
}

function nextQuestion() {
  state.idx++;
  if (state.idx >= QUESTIONS.length) {
    showSummary();
  } else {
    renderQuestion();
  }
}

function showSummary() {
  clearInterval(state.tmrId);
  g('progFill').style.width = '100%';
  g('scoreLabel').textContent = state.score + ' correct';
  renderDots();

  // Per-operation breakdown
  const ops = ['addition','subtraction','multiplication','division'];
  const opLabels = { addition:'Addition', subtraction:'Subtraction', multiplication:'Multiplication', division:'Division' };
  const opStats = {};
  ops.forEach(op => { opStats[op] = { correct:0, total:0 }; });
  state.log.forEach(e => {
    if (!opStats[e.op]) return;
    opStats[e.op].total++;
    if (e.result === 'correct' || e.result === 'retry-correct') opStats[e.op].correct++;
  });

  const card = g('qCard');
  card.innerHTML = '';

  const sumDiv = document.createElement('div');
  sumDiv.className = 'summary';

  const scoreEl = document.createElement('div');
  scoreEl.className = 'summary-score';
  scoreEl.textContent = state.score + '/20';

  const subEl = document.createElement('div');
  subEl.className = 'summary-sub';
  subEl.textContent = 'questions answered correctly';

  const msgEl = document.createElement('p');
  msgEl.className = 'summary-msg';
  msgEl.innerHTML = 'Great work finishing the session, Sam! Here\u2019s a breakdown of how you did across the four operations.';

  // Op grid
  const grid = document.createElement('div');
  grid.className = 'op-grid';
  ops.forEach(op => {
    const pill = document.createElement('div');
    pill.className = 'op-pill';
    const s = opStats[op];
    pill.innerHTML = '<span class="op-name">' + opLabels[op] + '</span><span class="op-score">' + s.correct + '/' + s.total + '</span>';
    grid.appendChild(pill);
  });

  const btn = document.createElement('button');
  btn.className = 'btn-restart';
  btn.textContent = 'Start a new session';
  btn.addEventListener('click', () => { location.reload(); });

  sumDiv.appendChild(scoreEl);
  sumDiv.appendChild(subEl);
  sumDiv.appendChild(msgEl);
  sumDiv.appendChild(grid);
  sumDiv.appendChild(btn);
  card.appendChild(sumDiv);
}

// Wire up buttons
g('btnCheck').addEventListener('click', checkAnswer);
g('btnNext').addEventListener('click', nextQuestion);

// Enter key support
document.addEventListener('keydown', e => {
  try {
    if (e.key === 'Enter') {
      const btnNext = g('btnNext');
      const btnCheck = g('btnCheck');
      if (btnNext && btnNext.style.display !== 'none') btnNext.click();
      else if (btnCheck && !btnCheck.disabled) btnCheck.click();
    }
  } catch(ex) {}
});

// Init
try { renderQuestion(); } catch(e) { console.error('Init error:', e); }
</script>
</body>
</html>
